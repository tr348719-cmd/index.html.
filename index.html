<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <title>Redirecionamento 20 s</title>
  <style>
    html,body{margin:0;height:100%;overflow:hidden;background:#000}
    iframe{width:100%;height:100%;border:none}
    #ov{position:fixed;left:0;top:0;width:100vw;height:100vh;background:#000 url(data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAiIGhlaWdodD0iNDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHJlY3Qgd2lkdGg9IjQwIiBoZWlnaHQ9IjQwIiBmaWxsPSIjMTExIi8+PC9zdmc+) repeat;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;font:24px/1.2 sans-serif;user-select:none}
    #cnt{font-size:80px;font-weight:700;color:#0ff;text-shadow:0 0 10px #0ff}
    #ov.blink{animation:blink .3s infinite}
    @keyframes blink{50%{opacity:.3}}
  </style>
</head>

<body>
  <!-- conteúdo que será liberado após 20 s -->
  <iframe id="frm" src="https://www.likevideo16.com/news_dVlTZlByWHNVd1kxZktJS29DTGR5QT09" style="display:none"></iframe>

  <div id="ov">
    <h3>AGUARDE 20 s → SEU LINK EXCLUSIVO</h3>
    <div id="cnt">20</div>
    <div id="msg">Não saia: você perderá a recompensa.</div>
  </div>

  <script>
    /* evita sair com F5 ou swipe */
    let blk = 1;
    window.onbeforeunload = () => blk && 'Timer ativo: sair cancela o prêmio';

    /* bloqueia scroll, swipe, menu context */
    ['touchmove','wheel','contextmenu'].forEach(e =>
      document.addEventListener(e, ev => ev.preventDefault(), {passive:false}));

    /* contador regressivo */
    let n = 20, el = document.getElementById("cnt"), ov = document.getElementById("ov");
    const t = setInterval(() => {
      if (n > 0) {
        el.textContent = --n;
        if (n <= 3) ov.classList.add('blink');
      }
    }, 1000);

    /* envia ping aos 10 s */
    setTimeout(() => {
      const cid = new URLSearchParams(location.search).get("cid");
      if (cid) fetch("https://seudominio.com/ping.php?cid="+encodeURIComponent(cid));
    }, 10_000);

    /* libera tela e pixels aos 20 s */
    setTimeout(() => {
      blk = 0;                 // libera F5
      clearInterval(t);
      ov.remove();
      frm.style.display = 'block';
      if(typeof fbq === "function") fbq("track","PageView");
      new Image().src = "https://www.mi-malist.com/pixel.gif?t="+Date.now();
    }, 20_000);
  </script>
</body>
</html>
