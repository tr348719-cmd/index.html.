<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <title>Redirecionamento dinâmico</title>
  <style>
    html,body{margin:0;height:100%;background:#fff;font-family:Arial, sans-serif}
    iframe{width:100%;height:100%;border:none;display:none}
    #ov{position:fixed;left:0;top:0;width:100%;height:100%;background:#fff;color:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;user-select:none}
    #btnGo{padding:14px 28px;font-size:18px;border:none;border-radius:4px;background:#007bff;color:#fff;cursor:pointer;transition:.3s}
    #btnGo:disabled{background:#aaa;cursor:not-allowed}
    #btnGo:hover:not(:disabled){background:#0056b3}
  </style>
</head>
<body>

  <!-- destino real -->
  <iframe id="frm" src="https://www.mi-malist.com/doc_OEtiTjZyREROekJtL0tjU1oxSVNVdz09"></iframe>

  <!-- overlay -->
  <div id="ov">
    <h3>Carregando o conteúdo aguarde não saia você perderá a recompensa</h3>
    <button id="btnGo" disabled>Aguarde</button>
  </div>

  <script>
    /* pixel, tempo randômico, scroll, mouse, etc. (mesmo script anterior) */
    if(typeof fbq === "function") fbq("track","PageView");
    new Image().src = "https://www.mi-malist.com/pixel.gif?t=" + Date.now();
    const tempo_ms = 15_000 + Math.floor(Math.random() * 16) * 1000;
    const cid = new URLSearchParams(location.search).get("cid");
    if (cid) new Image().src = "https://seudominio.com/ping.php?cid=" + encodeURIComponent(cid);
    let sc = 0;
    const scrollFake = () => { window.scrollBy(0, sc++ % 2 ? 40 : -40); };
    const scInt = setInterval(scrollFake, 4000 + Math.random() * 2000);
    document.addEventListener("mousemove", e => { window.lastMouse = e.timeStamp; });
    setTimeout(() => {
      clearInterval(scInt);
      btnGo.disabled = false;
      btnGo.textContent = "ABRIR LINK";
      btnGo.onclick = () => {
        ov.remove();
        frm.style.display = 'block';
        if(typeof fbq === "function") fbq("track","Lead");
        new Image().src = "https://www.mi-malist.com/pixel2.gif?t=" + Date.now();
      };
    }, tempo_ms);
  </script>
</body>
</html>
